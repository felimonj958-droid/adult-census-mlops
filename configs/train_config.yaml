project:
  name: adult-census-mlops
  random_state: 42

data:
  raw_path: data/raw/adult.csv
  sample_path: data/raw/adult_sample.csv
  target_column: income
  test_size: 0.2
  valid_size: 0.2

  categorical_features:
    - workclass
    - education
    - marital-status
    - occupation
    - relationship
    - race
    - sex
    - native-country

  numeric_features:
    - age
    - fnlwgt
    - education-num
    - capital-gain
    - capital-loss
    - hours-per-week

  allowed_targets:
    - "<=50K"
    - ">50K"

  numeric_ranges:
    age: [17, 90]
    education-num: [1, 16]
    hours-per-week: [1, 99]

model:
  type: logistic_regression
  params:
    C: 1.0
    max_iter: 2000
    class_weight: balanced

training:
  primary_metric: f1
  minimum_threshold: 0.55

mlflow:
  experiment_name: adult-income-experiments
  tracking_uri: mlruns

monitoring:
  drift_share_threshold: 0.3
  report_path: reports/drift_report.html